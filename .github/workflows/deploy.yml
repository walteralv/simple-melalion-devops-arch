name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub environment to use for deployment
        required: true
        default: dev
      operation:
        description: Terraform operation to run
        required: true
        default: apply
        type: choice
        options:
          - plan
          - apply
          - destroy
      terraform_directory:
        description: Terraform working directory
        required: true
        default: terraform

permissions:
  contents: read

concurrency:
  group: terraform-deploy-${{ github.ref }}-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Terraform ${{ inputs.operation }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    env:
      AZURE_CORE_OUTPUT: none
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      TF_IN_AUTOMATION: true
      TF_VAR_subscription_id: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      TF_VAR_project_name: ${{ vars.TF_VAR_PROJECT_NAME }}
      TF_VAR_environment: ${{ vars.TF_VAR_ENVIRONMENT }}
      TF_VAR_location: ${{ vars.TF_VAR_LOCATION }}
      TF_VAR_resource_group_name: ${{ vars.TF_VAR_RESOURCE_GROUP_NAME }}
      TF_VAR_storage_account_name: ${{ vars.TF_VAR_STORAGE_ACCOUNT_NAME }}
      TF_VAR_databricks_workspace_name: ${{ vars.TF_VAR_DATABRICKS_WORKSPACE_NAME }}
      TF_VAR_databricks_sku: ${{ vars.TF_VAR_DATABRICKS_SKU }}
      TF_VAR_databricks_secret_scope_name: ${{ vars.TF_VAR_DATABRICKS_SECRET_SCOPE_NAME }}
      TF_STATE_RESOURCE_GROUP: ${{ vars.TF_STATE_RESOURCE_GROUP }}
      TF_STATE_STORAGE_ACCOUNT: ${{ vars.TF_STATE_STORAGE_ACCOUNT }}
      TF_STATE_CONTAINER: ${{ vars.TF_STATE_CONTAINER }}
      TF_STATE_KEY: ${{ vars.TF_STATE_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Azure login
        uses: azure/login@v3
        with:
          creds: '{"clientId":"${{ secrets.ARM_CLIENT_ID }}","clientSecret":"${{ secrets.ARM_CLIENT_SECRET }}","subscriptionId":"${{ secrets.ARM_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.ARM_TENANT_ID }}"}'

      - name: Check required deployment configuration
        working-directory: ${{ inputs.terraform_directory }}
        run: |
          required_secrets=(
            ARM_CLIENT_ID
            ARM_CLIENT_SECRET
            ARM_SUBSCRIPTION_ID
            ARM_TENANT_ID
          )

          required_vars=(
            TF_VAR_project_name
            TF_VAR_environment
            TF_VAR_location
            TF_VAR_resource_group_name
            TF_VAR_storage_account_name
            TF_VAR_databricks_workspace_name
            TF_VAR_databricks_sku
            TF_VAR_databricks_secret_scope_name
            TF_STATE_RESOURCE_GROUP
            TF_STATE_STORAGE_ACCOUNT
            TF_STATE_CONTAINER
            TF_STATE_KEY
          )

          for required_secret in "${required_secrets[@]}"; do
            if [ -z "${!required_secret}" ]; then
              echo "Missing required workflow secret: ${required_secret}"
              exit 1
            fi
          done

          for required_var in "${required_vars[@]}"; do
            if [ -z "${!required_var}" ]; then
              echo "Missing required workflow variable: ${required_var}"
              exit 1
            fi
          done

      - name: Terraform Format Check
        working-directory: ${{ inputs.terraform_directory }}
        run: terraform fmt -check

      - name: Terraform Init
        working-directory: ${{ inputs.terraform_directory }}
        run: |
          terraform init -input=false \
            -backend-config="resource_group_name=${TF_STATE_RESOURCE_GROUP}" \
            -backend-config="storage_account_name=${TF_STATE_STORAGE_ACCOUNT}" \
            -backend-config="container_name=${TF_STATE_CONTAINER}" \
            -backend-config="key=${TF_STATE_KEY}"

      - name: Terraform Validate
        working-directory: ${{ inputs.terraform_directory }}
        run: terraform validate -no-color

      - name: Terraform Plan
        if: ${{ inputs.operation == 'plan' || inputs.operation == 'apply' }}
        working-directory: ${{ inputs.terraform_directory }}
        run: terraform plan -input=false -no-color -out=tfplan

      - name: Terraform Apply
        if: ${{ inputs.operation == 'apply' }}
        working-directory: ${{ inputs.terraform_directory }}
        run: terraform apply -auto-approve tfplan

      - name: Terraform Destroy Plan
        if: ${{ inputs.operation == 'destroy' }}
        working-directory: ${{ inputs.terraform_directory }}
        run: terraform plan -destroy -input=false -no-color -out=tfdestroy

      - name: Terraform Destroy
        if: ${{ inputs.operation == 'destroy' }}
        working-directory: ${{ inputs.terraform_directory }}
        run: terraform apply -auto-approve tfdestroy
